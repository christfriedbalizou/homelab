---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
  namespace: storage
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      main:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: quay.io/minio/minio
              tag: RELEASE.2024-01-29T03-56-32Z
            args:
              - server
              - /data
              - --console-address
              - :9001
            env:
              TZ: ${TIMEZONE}
              MINIO_ROOT_USER: ${SECRET_GRAFANA_ADMIN_USER}
              MINIO_ROOT_PASSWORD: ${SECRET_GRAFANA_ADMIN_PASSWORD}
              MINIO_PROMETHEUS_JOB_ID: "scrapeConfig/monitoring/minio"
              MINIO_PROMETHEUS_AUTH_TYPE: "public"
              MINIO_PROMETHEUS_URL: "http://prometheus-operated.monitoring.svc.cluster.local:9090"
            resources:
              requests:
                cpu: 5m
                memory: 128M
    service:
      main:
        controller: main
        ports:
          http:
            port: 9001
          s3:
            port: 9000

    serviceMonitor:
      main:
        enabled: true
        serviceName: minio
        endpoints:
          - port: s3
            scheme: http
            path: /minio/v2/metrics/cluster
            interval: 1m
            scrapeTimeout: 10s

    route:
      main:
        hostnames:
          - "minio.${SECRET_DOMAIN}"
          - "s3.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: s3
    persistence:
      data:
        enabled: true
        existingClaim: minio-jericho
        globalMounts:
          - subPath: minio
            path: /data
