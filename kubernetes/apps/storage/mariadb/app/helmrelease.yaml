---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      mariadb:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/mariadb
              tag: 11.4.11@sha256:2d06ae7bc1c259e0762c654f2619db0eb93925d11a6d38041f24f3bcb16408e8
            env:
              TZ: ${TIMEZONE}
              PUID: "${PUID}"
              PGID: "${PGID}"
              MYSQL_LOG_CONSOLE: "false"
            envFrom:
              - secretRef:
                  name: mariadb-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/bash
                      - /scripts/check.sh
                  failureThreshold: 3
                  initialDelaySeconds: 120
                  periodSeconds: 10
                  successThreshold: 1
                  timeoutSeconds: 1
              readiness: *probe
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: mariadb
        ports:
          mysql:
            port: 3306
            primary: true

    persistence:
      config:
        enabled: true
        type: nfs
        server: ${NFS_SERVER_APPS}
        path: /volume1/apps/storage
        globalMounts:
          - subPath: mariadb
      scripts:
        type: configMap
        name: mariadb-configmap
      initdb-scripts:
        type: configMap
        name: mariadb-configmap
        globalMounts:
          - subPath: create-letibeafrica.sql
            path: /config/initdb.d/create-letibeafrica.sql