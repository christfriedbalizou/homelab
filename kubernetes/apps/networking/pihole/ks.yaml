---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app pihole
  namespace: flux-system
spec:
  components:
    - ../../../../components/ext-auth
    - ../../../../components/protected-gatus
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: ./kubernetes/apps/networking/pihole/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: pihole
      GATUS_PATH: /admin
  targetNamespace: networking
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
    namespace: flux-system
  healthChecks:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      name: pihole
      namespace: networking
    - apiVersion: v1
      kind: Endpoints
      name: pihole
      namespace: networking
    - apiVersion: v1
      kind: Service
      name: pihole
      namespace: networking
  interval: 30m
  retryInterval: 1m
  timeout: 3m
