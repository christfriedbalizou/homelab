---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app isp
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: ./kubernetes/apps/networking/isp/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  targetNamespace: networking
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
    namespace: flux-system
  healthChecks:
    - apiVersion: networking.k8s.io/v1
      kind: Ingress
      name: isp
      namespace: networking
    - apiVersion: v1
      kind: Endpoints
      name: isp
      namespace: networking
    - apiVersion: v1
      kind: Service
      name: isp
      namespace: networking
  interval: 30m
  retryInterval: 1m
  timeout: 3m
