---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adguard-home
  namespace: networking
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      adguard:
        replicas: 1
        strategy: RollingUpdate

        containers:
          app:
            image:
              repository: adguard/adguardhome
              tag: v0.107.77
            env:
              TZ: ${TIMEZONE}

    service:
      app:
        controller: adguard
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "${ADGUARD_ADDR_NS1}"
          lbipam.cilium.io/sharing-key: "adguard-home"
        ports:
          http:
            primary: true
            port: 80
            targetPort: 3000
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP

    persistence:
      data:
        enabled: true
        existingClaim: adguard-home-jericho
        globalMounts:
          - path: /opt/adguardhome/work
            subPath: data
      conf:
        enabled: true
        existingClaim: adguard-home-jericho
        globalMounts:
          - path: /opt/adguardhome/conf
            subPath: conf
    route:
      app:
        hostnames:
          - "adguard-home.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
