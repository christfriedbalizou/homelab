---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: cloudnative-pg
      namespace: storage
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
              pullPolicy: IfNotPresent
            env:
              INIT_POSTGRES_DBNAME: open_webui
              INIT_POSTGRES_HOST: postgres-lb.storage.svc.cluster.local
              INIT_POSTGRES_SUPER_PASS: "${POSTGRES_SUPER_PASS}"
              INIT_POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: &secret cluster-open-webui-secrets
                    key: POSTGRES_USER
              INIT_POSTGRES_PASS:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: POSTGRES_PASSWORD
        pod:
          enableServiceLinks: false
        containers:
          app:
            image:
              repository: docker.io/openwebui/open-webui
              tag: 0.10.2@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
            env:
              ENABLE_LOGIN_FORM: "false"
              ENABLE_OAUTH_SIGNUP: "true"
              ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
              ENABLE_SIGNUP: "false"
              DEFAULT_USER_ROLE: user
              DEFAULT_MODELS: qwen3:4b
              OAUTH_ADMIN_ROLES: admin
              OAUTH_ALLOWED_ROLES: family
              OAUTH_CLIENT_ID: open-webui
              OAUTH_GROUP_CLAIM: groups
              OAUTH_PROVIDER_NAME: Authelia
              OAUTH_ROLES_CLAIM: groups
              OAUTH_SCOPES: openid email profile groups
              OAUTH_TOKEN_ENDPOINT_AUTH_METHOD: client_secret_post
              ENABLE_OPENAI_API: "false"
              ENABLE_OLLAMA_API: "true"
              OLLAMA_BASE_URL: http://ollama:11434
              OPENID_PROVIDER_URL: https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration
              OPENID_REDIRECT_URI: https://ai.${SECRET_DOMAIN}/oauth/oidc/callback
              RAG_EMBEDDING_ENGINE: ollama
              RAG_EMBEDDING_MODEL: nomic-embed-text:latest
              RAG_EMBEDDING_MODEL_AUTO_UPDATE: "false"
              REDIS_KEY_PREFIX: open-webui
              REDIS_URL: redis://dragonfly.storage.svc.cluster.local:6379/4
              SCARF_NO_ANALYTICS: "true"
              WEBUI_AUTH: "true"
              WEBUI_NAME: Private AI
              WEBUI_URL: https://ai.${SECRET_DOMAIN}
              WEBSOCKET_MANAGER: redis
              WEBSOCKET_REDIS_OPTIONS: '{"socket_timeout": null}'
            envFrom:
              - secretRef:
                  name: cluster-open-webui-secrets
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 1
                  failureThreshold: 30
            resources:
              requests:
                cpu: 25m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "ai.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http

    persistence:
      data:
        existingClaim: open-webui-jericho
        globalMounts:
          - subPath: open-webui
            path: /app/backend/data
