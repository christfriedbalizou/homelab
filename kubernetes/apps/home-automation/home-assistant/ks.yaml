---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app home-assistant
  namespace: flux-system
spec:
  components:
    - ../../../../components/zeroscaler
    - ../../../../components/ext-auth
    - ../../../../components/persistence/jericho-nfs
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: ./kubernetes/apps/home-automation/home-assistant/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: home-assistant
      JERICHO_PATH: /volume1/apps/home-automation
      ROUTE: home-assistant-code-server
  targetNamespace: home-automation
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: home-assistant
      namespace: home-automation
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
