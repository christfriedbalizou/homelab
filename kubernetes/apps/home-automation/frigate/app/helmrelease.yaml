---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      frigate:
        annotations:
          configmap.reloader.stakater.com/reload: frigate-config
        initContainers:
          model-cache:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.17.2@sha256:d4351369984d4a9e2a49ac59736f6490856a7ea11f7790040746d21496967010
            command:
              - python3
              - -c
            args:
              - |
                from pathlib import Path
                from urllib.request import urlretrieve

                model_dir = Path("/config/model_cache/facedet")
                model_dir.mkdir(parents=True, exist_ok=True)
                base_url = "https://github.com/NickM-27/facenet-onnx/releases/download/v1.0"
                for filename in ("facedet.onnx", "landmarkdet.yaml", "facenet.tflite"):
                    target = model_dir / filename
                    if target.is_file() and target.stat().st_size > 0:
                        continue
                    partial = target.with_suffix(f"{target.suffix}.part")
                    urlretrieve(f"{base_url}/{filename}", partial)
                    partial.replace(target)
        pod:
          runtimeClassName: nvidia
        containers:
          app:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.17.2@sha256:d4351369984d4a9e2a49ac59736f6490856a7ea11f7790040746d21496967010
            env:
              NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: &port 5000
                  initialDelaySeconds: 120
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: false
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 4Gi
                squat.ai/coral: 1
                "nvidia.com/gpu.shared": 1
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "frigate.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      data:
        existingClaim: frigate-jericho
        globalMounts:
          - path: /data
            subPath: frigate
      config:
        type: configMap
        name: frigate-config
        globalMounts:
          - path: /config/config.yml
            subPath: config.yml
            readOnly: true
      model-cache:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /config/model_cache
      cache:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        globalMounts:
          - path: /tmp/cache
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        globalMounts:
          - path: /dev/shm
      usb:
        type: hostPath
        hostPath: /dev/bus/usb
        globalMounts:
          - path: /dev/bus/usb
            readOnly: false
      media:
        existingClaim: frigate-lordcommander
        globalMounts:
          - path: /media/frigate
