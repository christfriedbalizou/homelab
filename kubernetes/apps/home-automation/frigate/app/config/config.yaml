---
auth:
  enabled: false
mqtt:
  host: mosquitto.storage.svc.cluster.local
database:
  path: /data/frigate.db
detectors:
  coral:
    type: edgetpu
    device: usb
face_recognition:
  enabled: true
  detection_threshold: 0.6
  recognition_threshold: 0.85
  min_area: 300
  min_faces: 1
  save_attempts: 200
  blur_confidence_filter: true
  model_size: small
audio:
  enabled: true
  listen:
    - speech
ffmpeg:
  input_args: preset-rtsp-restream
  hwaccel_args: preset-nvidia
birdseye:
  enabled: true
  mode: continuous
record:
  enabled: true
  motion:
    days: 7
  alerts:
    retain:
      days: 30
      mode: motion
  detections:
    retain:
      days: 30
      mode: motion
snapshots:
  enabled: true
  retain:
    default: 5
    objects:
      person: 30
review:
  alerts:
    labels:
      - hat
      - umbrella
      - person
      - speech
  detections:
    labels:
      - person
objects:
  track:
    - person
    - hat
    - umbrella
go2rtc:
  streams:
    entrance:
      - rtsp://go2rtc.home-automation.svc.cluster.local:554/entrance_hq

cameras:
  entrance:
    detect:
      enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://go2rtc.home-automation.svc.cluster.local:554/entrance_lq
          roles:
            - detect
        - path: rtsp://go2rtc.home-automation.svc.cluster.local:554/entrance_hq
          roles:
            - record
            - audio
