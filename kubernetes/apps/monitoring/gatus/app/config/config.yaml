---
# Note: Gatus vars should be escaped with $${VAR_NAME} to avoid interpolation by Flux
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m

alerting:
  discord:
    webhook-url: $${DISCORD_WEBHOOK_URL}
    default-alert:
      failure-threshold: 3
      success-threshold: 2
      send-on-resolved: true
      reminder-interval: 1h

endpoints:
  - name: Cloudflare
    group: connectivity
    url: icmp://1.1.1.1
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Google
    group: connectivity
    url: icmp://8.8.8.8
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: Quad9
    group: connectivity
    url: icmp://9.9.9.9
    interval: 1m
    conditions:
      - "[CONNECTED] == true"

  - name: k8s-3
    group: Cluster
    url: icmp://192.168.0.127
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "Node k8s-3 is not responding to ICMP."

  - name: k8s-6
    group: Cluster
    url: icmp://192.168.0.128
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "Node k8s-6 is not responding to ICMP."

  - name: k8s-7
    group: Cluster
    url: icmp://192.168.0.126
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "Node k8s-7 is not responding to ICMP."

  - name: Dragonfly
    group: Storage
    url: tcp://dragonfly.storage.svc.cluster.local:6379
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "Dragonfly is not accepting Redis connections."

  - name: PostgreSQL
    group: Storage
    url: tcp://postgres-lb.storage.svc.cluster.local:5432
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "PostgreSQL is not accepting TCP connections."

  - name: Mosquitto
    group: Storage
    url: tcp://mosquitto.storage.svc.cluster.local:1883
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "Mosquitto is not accepting MQTT connections."

  - name: Vaultwarden
    group: Identity
    url: http://vaultwarden.identity.svc.cluster.local/alive
    interval: 1m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord
        description: "Vaultwarden health check failed."

  - name: LLDAP HTTP
    group: Identity
    url: http://lldap.identity.svc.cluster.local/
    interval: 1m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord
        description: "LLDAP HTTP endpoint failed."

  - name: LLDAP LDAP
    group: Identity
    url: tcp://lldap.identity.svc.cluster.local:389
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "LLDAP LDAP port is not accepting connections."

  - name: AdGuard DNS
    group: Monitoring
    url: adguard-home.networking.svc.cluster.local:53
    interval: 1m
    dns:
      query-name: kubernetes.default.svc.cluster.local
      query-type: A
    conditions:
      - "[CONNECTED] == true"
      - "[DNS_RCODE] == NOERROR"
    alerts:
      - type: discord
        description: "AdGuard DNS query failed."

  - name: Cloudflared
    group: Monitoring
    url: http://cloudflared.networking.svc.cluster.local:8080/ready
    interval: 1m
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: discord
        description: "Cloudflared readiness check failed."

  - name: SMTP relay
    group: Monitoring
    url: tcp://smtp-relay.networking.svc.cluster.local:2525
    interval: 1m
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: discord
        description: "SMTP relay is not accepting connections."

metrics: true

storage:
  type: sqlite
  caching: true
  path: $${GATUS_CONFIG_PATH}/gatus.db

ui:
  title: Status | Gatus
  header: Status
  logo: https://avatars.githubusercontent.com/u/6354438
  link: https://gatus.${SECRET_DOMAIN}
  buttons:
    - name: Github
      link: https://github.com/christfriedbalizou
    - name: Homelab
      link: https://github.com/christfriedbalizou/homelab

web:
  port: $${WEB_PORT}
