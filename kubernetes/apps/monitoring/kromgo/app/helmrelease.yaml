---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kromgo
  namespace: monitoring
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: kromgo
  values:
    existingConfigMap: kromgo-configmap
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: networking
      hostnames:
        - "kromgo.${SECRET_DOMAIN}"
      additionalRules:
        - matches:
            - path:
                type: PathPrefix
                value: "/__kromgo/${KROMGO_AUTHELIA_APIKEY}/"
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                  type: ReplacePrefixMatch
                  replacePrefixMatch: /badges/
          backendRefs:
            - name: kromgo
              port: 8080
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
