---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashboard
  namespace: monitoring
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: kubernetes-dashboard-charts
  values:
    app:
      env:
        TZ: "${TIMEZONE}"
      extraArgs:
        - --enable-skip-login
        - --disable-settings-authorizer
        - --enable-insecure-login
        - --token-ttl=43200
    metricsScraper:
      enabled: true
    cert-manager:
      enabled: false
    kong:
      proxy:
        http:
          enabled: true
    nginx:
      enabled: false
