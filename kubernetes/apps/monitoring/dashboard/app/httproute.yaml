---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashboard
  annotations:
    hajimari.io/enable: "true"
    hajimari.io/appName: "Kubernetes Dashboard"
    hajimari.io/group: "System"
    hajimari.io/icon: mdi:kubernetes
spec:
  parentRefs:
    - name: envoy-external
      namespace: networking
  hostnames:
    - "kubernetes.${SECRET_DOMAIN}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dashboard-kong-proxy
          port: 443
