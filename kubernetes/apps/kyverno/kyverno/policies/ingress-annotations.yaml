---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: httproute-authentication
  annotations:
    policies.kyverno.io/title: HTTPRoute authentication
    policies.kyverno.io/subject: HTTPRoute, SecurityPolicy
    policies.kyverno.io/description: >-
      This policy creates Envoy Gateway SecurityPolicy resources for HTTPRoutes
      that opt in to Authelia authentication.
    policies.kyverno.io/category: Gateway, Authentication
spec:
  generateExisting: true
  rules:
    - name: authelia-extauth
      match:
        any:
          - resources:
              kinds: ["HTTPRoute"]
              annotations:
                auth.home.arpa/enabled: "true"
      generate:
        synchronize: true
        apiVersion: gateway.envoyproxy.io/v1alpha1
        kind: SecurityPolicy
        name: "{{ request.object.metadata.name }}-authelia"
        namespace: "{{ request.object.metadata.namespace }}"
        data:
          metadata:
            labels:
              app.kubernetes.io/managed-by: kyverno
              app.kubernetes.io/name: "{{ request.object.metadata.name }}"
          spec:
            targetRefs:
              - group: gateway.networking.k8s.io
                kind: HTTPRoute
                name: "{{ request.object.metadata.name }}"
            extAuth:
              failOpen: false
              headersToExtAuth:
                - accept
                - cookie
                - location
                - authorization
                - proxy-authorization
                - x-forwarded-proto
              http:
                backendRefs:
                  - name: authelia
                    namespace: identity
                    port: 9191
                path: /api/authz/ext-authz/
                headersToBackend:
                  - Remote-User
                  - Remote-Groups
                  - Remote-Name
                  - Remote-Email
