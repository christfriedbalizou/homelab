---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpackerr
  namespace: media
spec:
  interval: 10m0s
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      main:
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        containers:
          main:
            image:
              repository: ghcr.io/unpackerr/unpackerr
              tag: 0.15.0@sha256:9f4cb99b78d8fe2d55f79c490a715e14a8a28d9868373dad642ca5adc2ac3e91
            env:
              TZ: "${TIMEZONE}"
              UN_SONARR_0_URL: http://sonarr.media
              UN_SONARR_0_PATHS_0: /media/series
              UN_SONARR_0_API_KEY:
                secretKeyRef:
                  name: cluster-media-secrets
                  key: SONARR_0_API_KEY
              UN_RADARR_0_URL: http://radarr.media
              UN_RADARR_0_PATHS_0: /media/movies
              UN_RADARR_0_API_KEY:
                secretKeyRef:
                  name: cluster-media-secrets
                  key: RADARR_0_API_KEY
            resources:
              requests:
                cpu: 10m
                memory: 250Mi
              limits:
                memory: 1000Mi
    service:
      main:
        enabled: false
        controller: main
    persistence:
      media:
        enabled: true
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/media
