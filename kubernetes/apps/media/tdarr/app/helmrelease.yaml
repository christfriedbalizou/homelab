---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tdarr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      tdarr:
        containers:
          app:
            image:
              repository: haveagitgat/tdarr
              tag: 2.77.01@sha256:e317124469a2f500add53733e2c501be5e23ca0a4a18e9606f4f80cb3d63370d
            env:
              TZ: ${TIMEZONE}
              PUID: 1000
              PGID: 1000
              serverBindIP: true
              serverIP: 0.0.0.0
              serverPort: &serverPort 8266
              webUIPort: &port 8265
              internalNode: "true"
              inContainer: "true"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/status
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
      server:
        controller: *app
        ports:
          server:
            port: *serverPort

    route:
      main:
        annotations:
          auth.home.arpa/enabled: "true"
          hajimari.io/enable: "true"
          hajimari.io/icon: file-icons:adobe-mediaencoder
          hajimari.io/group: Media
        hostnames:
          - "tdarr.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
          enabled: true
          type: nfs
          server: ${NFS_SERVER_APPS}
          path: /volume1/apps/media
          globalMounts:
            - subPath: tdarr

      movies:
        enabled: true
        type: nfs
        server: ${NFS_SERVER_MEDIA}
        path: /volume1/media/movies
        globalMounts:
          - path: /mnt/storage/video/movies
      tv:
        enabled: true
        type: nfs
        server: ${NFS_SERVER_MEDIA}
        path: /volume1/media/series
        globalMounts:
          - path: /mnt/storage/video/tv
      shared:
        enabled: true
        type: nfs
        server: ${NFS_SERVER_MEDIA}
        path: /volume1/media/.tdarr
        globalMounts:
          - path: /mnt/cache
