---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
  namespace: kube-system
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: node-feature-discovery
  maxHistory: 3
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    featureGates:
      NodeFeatureAPI: false
      NodeFeatureGroupAPI: false
    worker:
      config:
        core:
          sources:
            - system
            - pci
            - usb
      resources:
        requests:
          cpu: 5m
          memory: 48Mi
    master:
      crdController: false
      resources:
        requests:
          cpu: 21m
          memory: 51Mi
    prometheus:
      enable: true
