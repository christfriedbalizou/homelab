---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          enableServiceLinks: false
        containers:
          app:
            image:
              repository: docker.io/openwebui/open-webui
              tag: 0.9.6@sha256:90eae5b419e40b4c3dd684582b2c83440b36f9ae2f6532c09639b2ba4ee65158
            env:
              ENABLE_LOGIN_FORM: "false"
              ENABLE_OAUTH_SIGNUP: "true"
              ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
              ENABLE_SIGNUP: "false"
              DEFAULT_USER_ROLE: user
              OAUTH_ADMIN_ROLES: admin
              OAUTH_ALLOWED_ROLES: family
              OAUTH_CLIENT_ID: open-webui
              OAUTH_GROUP_CLAIM: groups
              OAUTH_PROVIDER_NAME: Authelia
              OAUTH_ROLES_CLAIM: groups
              OAUTH_SCOPES: openid email profile groups
              OAUTH_TOKEN_ENDPOINT_AUTH_METHOD: client_secret_post
              ENABLE_OPENAI_API: "false"
              ENABLE_OLLAMA_API: "true"
              OLLAMA_BASE_URL: http://ollama.ai.svc.cluster.local:11434
              OPENID_PROVIDER_URL: https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration
              OPENID_REDIRECT_URI: https://ai.${SECRET_DOMAIN}/oauth/oidc/callback
              SCARF_NO_ANALYTICS: "true"
              WEBUI_AUTH: "true"
              WEBUI_NAME: Private AI
              WEBUI_URL: https://ai.${SECRET_DOMAIN}
            envFrom:
              - secretRef:
                  name: cluster-open-webui-secrets
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 1
                  failureThreshold: 30
            resources:
              requests:
                cpu: 25m
                memory: 512Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "ai.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http

    persistence:
      data:
        type: nfs
        server: ${NFS_SERVER_APPS}
        path: /volume1/apps/default
        globalMounts:
          - subPath: open-webui
            path: /app/backend/data
