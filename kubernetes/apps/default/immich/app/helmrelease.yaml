---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      immich:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: false
          enableServiceLinks: false
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
            env:
              TZ: ${TIMEZONE}
              IMMICH_CONFIG_FILE: /config/immich.json
              IMMICH_LOG_LEVEL: log
              IMMICH_TRUSTED_PROXIES: "${K8S_CLUSTER_CIDR},${K8S_SERVICE_CIDR}"
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning.default.svc.cluster.local:3003
              DB_HOSTNAME: immich-postgres.default.svc.cluster.local
              DB_PORT: "5432"
              DB_DATABASE_NAME: immich
              DB_VECTOR_EXTENSION: vectorchord
              REDIS_HOSTNAME: immich-valkey.default.svc.cluster.local
              REDIS_PORT: "6379"
              REDIS_DBINDEX: "0"
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: &secret cluster-immich-secrets
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: DB_PASSWORD
            probes:
              liveness: &serverProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /server/ping
                    port: &serverPort 2283
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *serverProbe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /server/ping
                    port: *serverPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

      immich-machine-learning:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: false
          enableServiceLinks: false
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3
            env:
              TZ: ${TIMEZONE}
              MACHINE_LEARNING_CACHE_FOLDER: /cache
              MACHINE_LEARNING_MODEL_TTL: "300"
              MACHINE_LEARNING_WORKERS: "1"
            probes:
              liveness: &mlProbe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &mlPort 3003
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *mlProbe
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *mlPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 4Gi

      immich-postgres:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: false
          enableServiceLinks: false
          securityContext:
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/postgres
              tag: 16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
            env:
              POSTGRES_DB: immich
              POSTGRES_INITDB_ARGS: "--data-checksums"
              DB_STORAGE_TYPE: HDD
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: DB_USERNAME
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: DB_PASSWORD
            probes:
              liveness: &postgresProbe
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *postgresProbe
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

      immich-valkey:
        type: statefulset
        pod:
          automountServiceAccountToken: false
          enableServiceLinks: false
          securityContext:
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: docker.io/valkey/valkey
              tag: 9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
            args:
              - valkey-server
              - --appendonly
              - "yes"
              - --dir
              - /data
            probes:
              liveness: &valkeyProbe
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - valkey-cli
                      - ping
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *valkeyProbe
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: immich
        ports:
          http:
            port: *serverPort
      machine-learning:
        controller: immich-machine-learning
        ports:
          http:
            port: *mlPort
      postgres:
        controller: immich-postgres
        ports:
          postgres:
            port: 5432
      valkey:
        controller: immich-valkey
        ports:
          valkey:
            port: 6379

    ingress:
      app:
        className: external
        annotations:
          external-dns.home.arpa/enabled: "true"
          hajimari.io/enable: "true"
          hajimari.io/group: "Family"
          hajimari.io/icon: "simple-icons:immich"
          nginx.ingress.kubernetes.io/proxy-body-size: "0"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
        hosts:
          - host: immich.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http

    persistence:
      library:
        type: nfs
        server: ${NFS_SERVER_APPS}
        path: /volume1/apps/default
        advancedMounts:
          immich:
            app:
              - subPath: immich/library
                path: /data
          immich-machine-learning:
            app:
              - subPath: immich/machine-learning
                path: /cache
          immich-postgres:
            app:
              - subPath: immich/postgres
                path: /var/lib/postgresql/data
          immich-valkey:
            app:
              - subPath: immich/valkey
                path: /data
      config:
        type: secret
        name: cluster-immich-secrets
        advancedMounts:
          immich:
            app:
              - path: /config/immich.json
                subPath: immich.json
                readOnly: true
