---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: cloudnative-pg
      namespace: storage
  values:
    controllers:
      immich:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
              pullPolicy: IfNotPresent
            env:
              INIT_POSTGRES_DBNAME: &db immich
              INIT_POSTGRES_HOST: &postgres postgres-lb.storage.svc.cluster.local
              INIT_POSTGRES_SUPER_PASS: "${POSTGRES_SUPER_PASS}"
              INIT_POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: &secret cluster-immich-secrets
                    key: DB_USERNAME
              INIT_POSTGRES_PASS:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: DB_PASSWORD
          init-vector:
            image:
              repository: ghcr.io/cloudnative-pg/postgresql
              tag: "18.4"
              pullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -ec
              - |
                psql \
                  --set=ON_ERROR_STOP=1 \
                  --host="$INIT_POSTGRES_HOST" \
                  --username=postgres \
                  --dbname="$INIT_POSTGRES_DBNAME" \
                  --command="CREATE EXTENSION IF NOT EXISTS cube CASCADE;" \
                  --command="CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;" \
                  --command="CREATE EXTENSION IF NOT EXISTS vector CASCADE;"
            env:
              INIT_POSTGRES_DBNAME: *db
              INIT_POSTGRES_HOST: *postgres
              PGPASSWORD: "${POSTGRES_SUPER_PASS}"
        pod:
          automountServiceAccountToken: false
          enableServiceLinks: false
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
            env:
              TZ: ${TIMEZONE}
              IMMICH_CONFIG_FILE: /config/immich.json
              IMMICH_LOG_LEVEL: log
              IMMICH_TRUSTED_PROXIES: "${K8S_CLUSTER_CIDR},${K8S_SERVICE_CIDR}"
              IMMICH_MACHINE_LEARNING_URL: http://127.0.0.1:3003
              DB_HOSTNAME: *postgres
              DB_PORT: "5432"
              DB_DATABASE_NAME: *db
              DB_VECTOR_EXTENSION: pgvector
              REDIS_HOSTNAME: 127.0.0.1
              REDIS_PORT: "6379"
              REDIS_DBINDEX: "0"
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: DB_PASSWORD
            probes:
              liveness: &serverProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /server/ping
                    port: &serverPort 2283
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *serverProbe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /server/ping
                    port: *serverPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi

          machine-learning:
            image:
              repository: ghcr.io/immich-app/immich-machine-learning
              tag: v2.7.5@sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3
            env:
              TZ: ${TIMEZONE}
              MACHINE_LEARNING_CACHE_FOLDER: /cache
              MACHINE_LEARNING_MODEL_TTL: "300"
              MACHINE_LEARNING_WORKERS: "1"
            probes:
              liveness: &mlProbe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &mlPort 3003
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *mlProbe
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *mlPort
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 4Gi

          # Keep Immich on local Valkey: Bull queue Lua scripts fail against the
          # shared Dragonfly cluster with undeclared-key script errors.
          valkey:
            image:
              repository: docker.io/valkey/valkey
              tag: 9@sha256:3b55fbaa0cd93cf0d9d961f405e4dfcc70efe325e2d84da207a0a8e6d8fde4f9
            args:
              - valkey-server
              - --appendonly
              - "yes"
              - --dir
              - /data
            probes:
              liveness: &valkeyProbe
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - valkey-cli
                      - ping
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *valkeyProbe
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 512Mi
            securityContext:
              runAsNonRoot: true
              runAsUser: 999
              runAsGroup: 999

    service:
      valkey:
        controller: immich
        ports:
          valkey:
            port: 6379
      app:
        controller: immich
        ports:
          http:
            port: *serverPort
      machine-learning:
        controller: immich
        ports:
          http:
            port: *mlPort

    route:
      app:
        hostnames:
          - "immich.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: networking
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: app
                port: http
    persistence:
      library:
        type: nfs
        server: ${NFS_SERVER_APPS}
        path: /volume1/apps/default
        advancedMounts:
          immich:
            app:
              - subPath: immich/library
                path: /data
            machine-learning:
              - subPath: immich/machine-learning
                path: /cache
            valkey:
              - subPath: immich/valkey
                path: /data
      config:
        type: secret
        name: cluster-immich-secrets
        advancedMounts:
          immich:
            app:
              - path: /config/immich.json
                subPath: immich.json
                readOnly: true
