---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app firefox
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      firefox:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: false
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        initContainers:
          init-log:
            image:
              repository: ghcr.io/jlesage/firefox
              tag: v26.03.1@sha256:a68749c6696c857d992c5b750c234ab86f184bcac92d6c080bab7679c759f845
            command:
              - /bin/sh
              - -c
              - "mkdir -p /config/log/firefox && touch /config/log/firefox/output.log /config/log/firefox/error.log && chown -R 1000:1000 /config/log && chmod -R u+rwX,g+rwX /config/log"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              privileged: false
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["NET_RAW"]
        containers:
          app:
            image:
              repository: ghcr.io/jlesage/firefox
              tag: v26.03.1@sha256:a68749c6696c857d992c5b750c234ab86f184bcac92d6c080bab7679c759f845
            env:
              TZ: ${TIMEZONE}
              USER_ID: "1000"
              GROUP_ID: "1000"
              KEEP_APP_RUNNING: "1"
              TAKE_CONFIG_OWNERSHIP: "0"
              WEB_AUTHENTICATION: "0"
              WEB_FILE_MANAGER: "0"
              WEB_TERMINAL: "0"
              WEB_AUDIO: "0"
              VNC_LISTENING_PORT: "-1"
              FF_OPEN_URL: "https://hajimari.${SECRET_DOMAIN}"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 5800
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["NET_RAW"]
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    ingress:
      app:
        className: external
        annotations:
          external-dns.home.arpa/enabled: "true"
          auth.home.arpa/enabled: "true"
          hajimari.io/enable: "true"
          hajimari.io/group: "Tools"
          hajimari.io/icon: "mdi:firefox"
        hosts:
          - host: "firefox.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/apps/default
        advancedMounts:
          firefox:
            app:
              - subPath: firefox
                path: /config
      log:
        type: emptyDir
        advancedMounts:
          firefox:
            init-log:
              - path: /config/log
            app:
              - path: /config/log
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      var:
        type: emptyDir
        globalMounts:
          - path: /var/tmp
