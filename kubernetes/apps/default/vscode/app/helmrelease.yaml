---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vscode
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      vscode:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: ghcr.io/christfriedbalizou/vscode
              tag: 4.118.0@sha256:074296ebb373654c0f36c324d16f022cce0417e997be6f6f527e5fcb7bdd571c
            env:
              CODE_SERVER_AUTH: none
              GIT_USER_EMAIL: christfriedbalizou@gmail.com
              GIT_USER_NAME: Christfried BALIZOU
              HOME: /home/coder
              MISE_TRUSTED_CONFIG_PATHS: /workspace:/home/coder
              SHELL: /bin/bash
              TZ: ${TIMEZONE}
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080
    ingress:
      app:
        className: external
        annotations:
          external-dns.home.arpa/enabled: "true"
          auth.home.arpa/enabled: "true"
          hajimari.io/enable: "true"
          hajimari.io/group: "Tools"
          hajimari.io/icon: "mdi:microsoft-visual-studio-code"
        hosts:
          - host: vscode.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/apps/default
        advancedMounts:
          vscode:
            app:
              - subPath: vscode/config
                path: /config
              - subPath: vscode/home
                path: /home/coder
              - subPath: vscode/workspace
                path: /workspace
      defaults:
        type: configMap
        name: vscode-defaults
        globalMounts:
          - path: /opt/code-server-defaults
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
