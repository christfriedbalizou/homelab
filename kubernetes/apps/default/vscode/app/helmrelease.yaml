---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vscode
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      vscode:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        initContainers:
          dotfiles:
            image: &vscodeImage
              repository: ghcr.io/christfriedbalizou/vscode
              tag: 4.118.0@sha256:4873bef8449a6667924a50cda57c9c34b14f0d727d102352a52c343742f5c108
            env:
              HOME: /home/coder
              MISE_TRUSTED_CONFIG_PATHS: /home/coder/src/github.com/christfriedbalizou/venv:/workspace:/home/coder
              SHELL: /bin/bash
              TZ: ${TIMEZONE}
              VENV_REPO_URL: https://github.com/christfriedbalizou/venv.git
              # renovate: datasource=github-tags depName=christfriedbalizou/venv
              VENV_VERSION: v0.0.1
            command:
              - /bin/bash
              - -ec
              - |
                set -euo pipefail

                export HOME=/home/coder
                export PATH="${HOME}/.local/bin:${HOME}/.local/share/mise/shims:${PATH}"

                repo_dir="${HOME}/src/github.com/christfriedbalizou/venv"
                mkdir -p "$(dirname "${repo_dir}")"

                if [ -d "${repo_dir}/.git" ]; then
                  git -C "${repo_dir}" remote set-url origin "${VENV_REPO_URL}"
                  git -C "${repo_dir}" fetch --tags --force --prune origin
                else
                  rm -rf "${repo_dir}"
                  git clone "${VENV_REPO_URL}" "${repo_dir}"
                fi

                git -C "${repo_dir}" checkout --force "${VENV_VERSION}"
                git -C "${repo_dir}" reset --hard "${VENV_VERSION}"
                "${repo_dir}/bootstrap.sh"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        containers:
          app:
            image: *vscodeImage
            env:
              CODEX_AUTO_LOGIN: "false"
              CODEX_HOME: /home/coder/.codex
              CODE_SERVER_AUTH: none
              GIT_USER_EMAIL: christfriedbalizou@gmail.com
              GIT_USER_NAME: Christfried BALIZOU
              HOME: /home/coder
              MISE_TRUSTED_CONFIG_PATHS: /workspace:/home/coder
              SHELL: /bin/bash
              TZ: ${TIMEZONE}
              VSCODE_PROXY_URI: 'https://vscode.${SECRET_DOMAIN}/proxy/{{ "{{port}}" }}/'
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: *app
        ports:
          http:
            primary: true
            port: 8080
          codex-oauth:
            port: 1455
    ingress:
      app:
        className: external
        annotations:
          external-dns.home.arpa/enabled: "true"
          auth.home.arpa/enabled: "true"
          hajimari.io/enable: "true"
          hajimari.io/group: "Tools"
          hajimari.io/icon: "mdi:microsoft-visual-studio-code"
        hosts:
          - host: vscode.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/apps/default
        advancedMounts:
          vscode:
            dotfiles:
              - subPath: vscode/home
                path: /home/coder
            app:
              - subPath: vscode/config
                path: /config
              - subPath: vscode/home
                path: /home/coder
              - subPath: vscode/workspace
                path: /workspace
      defaults:
        type: configMap
        name: vscode-defaults
        globalMounts:
          - path: /opt/code-server-defaults
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
