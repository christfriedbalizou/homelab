---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vscode
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      vscode:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        initContainers:
          dotfiles:
            image: &vscodeImage
              repository: ghcr.io/christfriedbalizou/vscode
              tag: 4.122.0@sha256:c6f0826c02c9e422ff45ba76dcf3ddf9f9904bbc8ce2091be65c339a8fcea5c2
            env:
              HOME: /home/coder
              MISE_TRUSTED_CONFIG_PATHS: /home/coder/src/github.com/christfriedbalizou/dotfiles.git:/home/coder/src:/home/coder
              SHELL: /bin/bash
              TZ: ${TIMEZONE}
              DOTFILES_REPO_URL: https://github.com/christfriedbalizou/dotfiles.git
              # renovate: datasource=github-tags depName=christfriedbalizou/dotfiles
              DOTFILES_VERSION: main
            command:
              - /usr/bin/env
              - python3
              - /opt/vscode-dotfiles-init/init-dotfiles.py
        containers:
          app:
            image: *vscodeImage
            env:
              CODEX_AUTO_LOGIN: "false"
              CODEX_HOME: /home/coder/.codex
              CODE_SERVER_AUTH: none
              CODE_SERVER_WORKSPACE_DIR: /home/coder/src
              GIT_USER_EMAIL: christfriedbalizou@gmail.com
              GIT_USER_NAME: Christfried BALIZOU
              HOME: /home/coder
              MISE_TRUSTED_CONFIG_PATHS: /home/coder/src/github.com/christfriedbalizou/dotfiles.git:/home/coder/src:/home/coder
              SHELL: /bin/bash
              TZ: ${TIMEZONE}
              VSCODE_PROXY_URI: 'https://vscode.${SECRET_DOMAIN}/proxy/{{ "{{port}}" }}/'
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        controller: *app
        ports:
          http:
            primary: true
            port: 8080
          codex-oauth:
            port: 1455
    ingress:
      app:
        className: external
        annotations:
          external-dns.home.arpa/enabled: "true"
          auth.home.arpa/enabled: "true"
          hajimari.io/enable: "true"
          hajimari.io/group: "Tools"
          hajimari.io/icon: "mdi:microsoft-visual-studio-code"
        hosts:
          - host: vscode.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        type: nfs
        server: ${NFS_SERVER_APPS}
        path: /volume1/apps/default
        advancedMounts:
          vscode:
            dotfiles:
              - subPath: vscode/home
                path: /home/coder
            app:
              - subPath: vscode/config
                path: /config
              - subPath: vscode/home
                path: /home/coder
      defaults:
        type: configMap
        name: vscode-defaults
        globalMounts:
          - path: /opt/code-server-defaults
            readOnly: true
      dotfiles-init:
        type: configMap
        name: vscode-dotfiles-init
        advancedMounts:
          vscode:
            dotfiles:
              - path: /opt/vscode-dotfiles-init
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
