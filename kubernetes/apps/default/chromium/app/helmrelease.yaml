---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app chromium
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      chromium:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: false
          securityContext:
            fsGroup: ${PGID}
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: ghcr.io/christfriedbalizou/chromium
              tag: 2026.5.29@sha256:c940d70d4d07299c37098c581a7642333dc315f4f45130c8198dc308471e88cf
            env:
              PUID: "${PUID}"
              PGID: "${PGID}"
              TZ: ${TIMEZONE}
              HARDEN_DESKTOP: "true"
              SELKIES_ENABLE_SHARING: "false|locked"
              SELKIES_MANUAL_WIDTH: "1920"
              SELKIES_MANUAL_HEIGHT: "1080"
              START_DOCKER: "false"
              TITLE: Chromium
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["NET_RAW"]
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 120
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probe
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 3Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    ingress:
      app:
        className: external
        annotations:
          external-dns.home.arpa/enabled: "true"
          auth.home.arpa/enabled: "true"
          hajimari.io/enable: "true"
          hajimari.io/group: "Tools"
          hajimari.io/icon: "simple-icons:chromium"
        hosts:
          - host: chromium.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/apps/default
        advancedMounts:
          chromium:
            app:
              - subPath: chromium
                path: /config
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
