---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: autotranslate
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    controllers:
      autotranslate:
        type: deployment
        replicas: 1
        containers:
          main:
            image:
              repository: zorbatherainy/autotranslate
              tag: 2.4.1@sha256:a69f5277f1ce0d2634438aef3567f78093f602e326c3b008181cafad9b97dff1
            env:
              DEEPL_AUTH_KEY: ${AUTOTRANSLATE_DEEPL_AUTH_KEY}
              DEEPL_TARGET_LANG: FR
              ORIGINAL_BEFORE_TRANSLATION: 0
              TRANSLATE_FILENAME: 0
              CHECK_EVERY_X_MINUTES: 15
            resources:
              requests:
                cpu: "10m"
                memory: "512Mi"
              limits:
                memory: "1024Mi"

    service:
      autotranslate:
        controller: autotranslate
        ports:
          http:
            port: 8080

    persistence:
      logs:
        type: emptyDir
        globalMounts:
          - path: /logDir

      translate:
        existingClaim: autotranslate-jericho
        globalMounts:
          - subPath: autotranslate
            path: /outputDir

      consume:
        existingClaim: autotranslate-lordcommander
        globalMounts:
          - subPath: autotranslate
            path: /inputDir
