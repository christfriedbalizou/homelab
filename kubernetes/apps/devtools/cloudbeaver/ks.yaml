---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app cloudbeaver
  namespace: flux-system
spec:
  components:
    - ../../../../components/zeroscaler
    - ../../../../components/persistence/jericho-nfs
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: ./kubernetes/apps/devtools/cloudbeaver/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
    substitute:
      APP: cloudbeaver
      JERICHO_PATH: /volume1/apps/devtools
  targetNamespace: devtools
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
    namespace: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: cloudbeaver
      namespace: devtools
  interval: 30m
  retryInterval: 1m
  timeout: 3m
