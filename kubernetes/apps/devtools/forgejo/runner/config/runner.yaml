---
cache:
  enabled: true
  dir: /data/cache
container:
  docker_host: "-"
  workdir_parent: shared/workdir
host:
  workdir_parent: /data/act
kubernetes:
  namespace: devtools
  poll_timeout: 10m
log:
  level: info
plugins:
  k8s:
    address: unix:///plugin/forgejo-runner-k8s.sock
    options:
      namespace: devtools
      poll_timeout: 10m
      labels: "app.kubernetes.io/name=forgejo-runner-instance,app.kubernetes.io/instance=runner-${CLUSTER_NAME}"
runner:
  capacity: 4
  file: /data/.runner
  labels:
    - ubuntu-latest:k8s:/config/podspec-default.yaml
    - ubuntu-24.04:k8spod:/config/podspec-default.yaml
    - default:k8s:/config/podspec-default.yaml
    - docker:k8s:/config/podspec-dind.yaml
  timeout: 3h
  shutdown_timeout: 3m
