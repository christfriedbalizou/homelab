---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      forgejo-runner:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: true
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: { type: RuntimeDefault }
          terminationGracePeriodSeconds: 300
        initContainers:
          k8s-plugin:
            image:
              repository: registry.erwanleboucher.dev/erwanleboucher.dev/eleboucher/runner-k8s-plugin
              tag: 12.10.9@sha256:7fb94371ccc6ef3ff7e2110b2c04050a68bb8031d3224ed8aee2cd5e1d31c673
            args:
              - --listen
              - unix:///plugin/forgejo-runner-k8s.sock
            restartPolicy: Always
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        containers:
          runner:
            image:
              repository: registry.erwanleboucher.dev/erwanleboucher.dev/eleboucher/runner
              tag: 12.10.2@sha256:d5eeafda573012c229b730f5a18437b464d946473478e1f6bd56fd537b881609
            command:
              - sh
              - -ec
              - |
                exec /bin/forgejo-runner daemon \
                  --config /config/runner.yaml \
                  --url http://forgejo-http:3000 \
                  --uuid "$(cat /etc/forgejo-runner-secret/uuid)" \
                  --token-url file:///etc/forgejo-runner-secret/token
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: configMap
        name: forgejo-runner-config
        globalMounts:
          - path: /config
      plugin:
        type: emptyDir
        globalMounts:
          - path: /plugin
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp
      runner-secret:
        type: secret
        name: cluster-forgejo-runner-secrets
        globalMounts:
          - path: /etc/forgejo-runner-secret
            readOnly: true
    serviceAccount:
      forgejo-runner: {}
