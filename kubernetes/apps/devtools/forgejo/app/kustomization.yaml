---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: devtools
resources:
  - ./helmrelease.yaml
  - ./httproute.yaml
  - ./secret.sops.yaml
configMapGenerator:
  - name: forgejo-config
    files:
      - gitea.yaml=./config/gitea.yaml
generatorOptions:
  disableNameSuffixHash: true
