---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo
  dependsOn:
    - name: cloudnative-pg
      namespace: storage
    - name: dragonfly-operator
      namespace: storage
    - name: minio
      namespace: storage
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    extraDeploy:
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: forgejo-init-db
          annotations:
            helm.sh/hook: pre-install,pre-upgrade
            helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
        spec:
          backoffLimit: 6
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: init-db
                  image: ghcr.io/home-operations/postgres-init:18
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: INIT_POSTGRES_DBNAME
                      value: forgejo
                    - name: INIT_POSTGRES_HOST
                      value: postgres-lb.storage.svc.cluster.local
                    - name: INIT_POSTGRES_SUPER_PASS
                      value: "${POSTGRES_SUPER_PASS}"
                    - name: INIT_POSTGRES_USER
                      valueFrom:
                        secretKeyRef:
                          name: &secret cluster-forgejo-secrets
                          key: FORGEJO_POSTGRES_USER
                    - name: INIT_POSTGRES_PASS
                      valueFrom:
                        secretKeyRef:
                          name: *secret
                          key: FORGEJO_POSTGRES_PASS
    gitea:
      admin:
        username: ""
      additionalConfigFromEnvs:
        - name: FORGEJO__DATABASE__USER
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__DATABASE__USER
        - name: FORGEJO__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__DATABASE__PASSWD
        - name: FORGEJO__SECURITY__INTERNAL_TOKEN
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__SECURITY__INTERNAL_TOKEN
        - name: FORGEJO__SECURITY__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__SECURITY__SECRET_KEY
        - name: FORGEJO__SERVER__LFS_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__SERVER__LFS_JWT_SECRET
        - name: FORGEJO__STORAGE__MINIO_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__STORAGE__MINIO_ENDPOINT
        - name: FORGEJO__STORAGE__MINIO_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__STORAGE__MINIO_ACCESS_KEY_ID
        - name: FORGEJO__STORAGE__MINIO_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__STORAGE__MINIO_SECRET_ACCESS_KEY
        - name: FORGEJO__STORAGE__MINIO_BUCKET
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__STORAGE__MINIO_BUCKET
        - name: FORGEJO__STORAGE__MINIO_LOCATION
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__STORAGE__MINIO_LOCATION
        - name: FORGEJO__STORAGE__MINIO_USE_SSL
          valueFrom:
            secretKeyRef:
              name: *secret
              key: FORGEJO__STORAGE__MINIO_USE_SSL
      config:
        actions:
          ENABLED: true
          DEFAULT_ACTIONS_URL: https://data.forgejo.org
        cache:
          ENABLED: true
          ADAPTER: redis
          HOST: redis://dragonfly.storage.svc.cluster.local:6379/5?pool_size=100&idle_timeout=180s
        database:
          DB_TYPE: postgres
          HOST: postgres-lb.storage.svc.cluster.local:5432
          NAME: forgejo
        cron.archive_cleanup:
          ENABLED: true
          RUN_AT_START: true
          SCHEDULE: "@every 1h"
          OLDER_THAN: 2h
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
        mailer:
          ENABLED: true
          FROM: "Forgejo <noreply@${SECRET_DOMAIN}>"
          PROTOCOL: smtp
          SMTP_ADDR: smtp-relay.networking.svc.cluster.local
          SMTP_PORT: "${SMTP_RELAY_PORT}"
        oauth2_client:
          ENABLE_AUTO_REGISTRATION: true
          OPENID_CONNECT_SCOPES: profile email groups
          USERNAME: nickname
        openid:
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        queue:
          TYPE: redis
          CONN_STR: redis://dragonfly.storage.svc.cluster.local:6379/7?pool_size=100&idle_timeout=180s
        repository:
          DEFAULT_PRIVATE: private
          DEFAULT_PUSH_CREATE_PRIVATE: true
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls,repo.actions
          DISABLED_REPO_UNITS: repo.ext_wiki,repo.ext_issues
          ROOT: /data/git/repositories
        repository.pull-request:
          DEFAULT_MERGE_STYLE: rebase
        security:
          INSTALL_LOCK: true
          REVERSE_PROXY_TRUSTED_PROXIES: "${K8S_CLUSTER_CIDR},${K8S_SERVICE_CIDR}"
        server:
          APP_DATA_PATH: /data/gitea
          DOMAIN: git.${SECRET_DOMAIN}
          LFS_START_SERVER: true
          ROOT_URL: https://git.${SECRET_DOMAIN}/
          SSH_DOMAIN: git.${SECRET_DOMAIN}
          SSH_PORT: &sshPort 22
        service:
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          DISABLE_REGISTRATION: false
          ENABLE_INTERNAL_SIGNIN: false
          ENABLE_NOTIFY_MAIL: true
          ENABLE_PASSWORD_SIGNIN_FORM: false
          REQUIRE_SIGNIN_VIEW: true
          SHOW_REGISTRATION_BUTTON: false
        service.explore:
          DISABLE_CODE_PAGE: false
          DISABLE_ORGANIZATIONS_PAGE: true
          DISABLE_USERS_PAGE: true
          REQUIRE_SIGNIN_VIEW: false
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://dragonfly.storage.svc.cluster.local:6379/6?pool_size=100&idle_timeout=180s
          SESSION_LIFE_TIME: "1209600"
        storage:
          STORAGE_TYPE: minio
          SERVE_DIRECT: false
        webhook:
          ALLOWED_HOST_LIST: "*"
      oauth:
        - name: authelia
          adminGroup: admin
          autoDiscoverUrl: https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration
          existingSecret: *secret
          groupClaimName: groups
          provider: openidConnect
          requiredClaimName: groups
          requiredClaimValue: "${FORGEJO_OIDC_REQUIRED_GROUP}"
          scopes: profile email groups
    image:
      digest: sha256:e7a59d193ad5e8bde19cffc68f26ee00e77a5b0014e95433eed5038f0c3888da
      rootless: true
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 15.0.3-rootless
    httpRoute:
      enabled: false
    persistence:
      create: false
      claimName: forgejo-jericho
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis-cluster:
      enabled: false
    service:
      ssh:
        port: *sshPort
    valkey-cluster:
      enabled: false
