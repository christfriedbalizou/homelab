---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app forgejo
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: forgejo
  valuesFrom:
    - kind: ConfigMap
      name: forgejo-config
      valuesKey: gitea.yaml
  dependsOn:
    - name: cloudnative-pg
      namespace: storage
    - name: dragonfly-operator
      namespace: storage
    - name: minio
      namespace: storage
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    extraDeploy:
      - apiVersion: batch/v1
        kind: Job
        metadata:
          name: forgejo-init-db
          annotations:
            helm.sh/hook: pre-install,pre-upgrade
            helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
        spec:
          backoffLimit: 6
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: init-db
                  image: ghcr.io/home-operations/postgres-init:18
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: INIT_POSTGRES_DBNAME
                      value: forgejo
                    - name: INIT_POSTGRES_HOST
                      value: postgres-lb.storage.svc.cluster.local
                    - name: INIT_POSTGRES_SUPER_PASS
                      value: "${POSTGRES_SUPER_PASS}"
                    - name: INIT_POSTGRES_USER
                      valueFrom:
                        secretKeyRef:
                          name: &secret cluster-forgejo-secrets
                          key: FORGEJO_POSTGRES_USER
                    - name: INIT_POSTGRES_PASS
                      valueFrom:
                        secretKeyRef:
                          name: *secret
                          key: FORGEJO_POSTGRES_PASS
    extraContainerVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraInitVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraVolumes:
      - name: signing-key
        secret:
          secretName: *secret
          defaultMode: 0400
          items:
            - key: ed25519
              path: ed25519
            - key: ed25519.pub
              path: ed25519.pub
    image:
      digest: sha256:e7a59d193ad5e8bde19cffc68f26ee00e77a5b0014e95433eed5038f0c3888da
      rootless: true
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 15.0.3-rootless
    httpRoute:
      enabled: false
    persistence:
      create: false
      claimName: forgejo-jericho
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
    redis-cluster:
      enabled: false
    service:
      ssh:
        port: 22
    tcpRoute:
      enabled: true
      parentRefs:
        - name: envoy-external
          namespace: networking
          sectionName: ssh
    valkey-cluster:
      enabled: false
