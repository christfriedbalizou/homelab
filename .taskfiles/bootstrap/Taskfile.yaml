---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:

  talos:
    desc: Bootstrap the Talos cluster
    dir: '{{.TALOS_DIR}}'
    cmds:
      - |
        if [ ! -f talsecret.sops.yaml ]; then
          talosctl gen secrets -o /tmp/talsecret.yaml
          sops --filename-override talos/talsecret.sops.yaml --encrypt /tmp/talsecret.yaml > talsecret.sops.yaml
          rm -f /tmp/talsecret.yaml
        fi
      - python3 {{.SCRIPTS_DIR}}/generate-configs.py
      - |
        for ip in $(yq '.nodes[].ipAddress' {{.TALOS_DIR}}/talconfig.yaml); do
          hostname=$(yq ".nodes[] | select(.ipAddress == \"$ip\") | .hostname" {{.TALOS_DIR}}/talconfig.yaml)
          talosctl apply-config --nodes "$ip" --file {{.TALOS_DIR}}/clusterconfig/kubernetes-$hostname.yaml --insecure
        done
      - |
        first_cp=$(yq '.nodes[] | select(.controlPlane == true) | .ipAddress' {{.TALOS_DIR}}/talconfig.yaml | head -1)
        until talosctl bootstrap --nodes "$first_cp"; do sleep 10; done
      - until talosctl kubeconfig {{.ROOT_DIR}} --force; do sleep 10; done
    preconditions:
      - test -f {{.ROOT_DIR}}/.sops.yaml
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - test -f {{.TALOS_DIR}}/talconfig.yaml
      - which talosctl sops yq

  apps:
    desc: Bootstrap apps into the Talos cluster
    cmd: bash {{.SCRIPTS_DIR}}/bootstrap-apps.sh
    preconditions:
      - msg: Unsupported bash version, run `brew install bash` to upgrade
        sh: '{{if eq OS "darwin"}}test -f /opt/homebrew/bin/bash || test -f /usr/local/bin/bash{{end}}'
      - test -f {{.KUBECONFIG}}
      - test -f {{.ROOT_DIR}}/.sops.yaml
      - test -f {{.SCRIPTS_DIR}}/bootstrap-apps.sh
      - test -f {{.SOPS_AGE_KEY_FILE}}
